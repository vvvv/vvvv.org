{{ $rightItem := .right}}

{{ with .context}}
<div class="swiper-slide py-4 px-3">
    <div class="card text-white card-has-bg click-col h-100">
        {{ partial "showcase-card-image" (dict "resize" "600x600 webp q95 photo center" "ctx" .) }}
        <div class="card-img-overlay d-flex">
            <div class="card-body mx-2 mb-sm-3 mb-md-0 align-self-end flex-grow-0 d-flex flex-column justify-content-end">
                <a href="{{ .Params.link }}" target="_blank" class="stretched-link"><h4 class="card-title mt-0">{{.Params.Title}}</h4></a>
                <div class="d-none d-sm-block d-md-none d-lg-block">
                    <div class="d-block d-xl-none">{{.Summary}}</div>
                    <div class="d-none d-xl-block">{{.Content}}</div>
                </div>
                <small class="d-xs-none d-sm-block card-meta mb-lg-2 mt-0 mt-sm-4">{{.Params.Author}}</small>
            </div>
        </div>
    </div>
</div>
{{ end }}
