{{ $rightItem := .right}}

{{ with .context}}
<div class="col-12 col-md-6 col-lg-4 my-3 p-4">
    <div class="card text-white card-has-bg click-col">
        {{ partial "showcase-card-image" (dict "resize" "600x600 webp q95 photo center" "ctx" .) }}
        <div class="card-body px-4 pt-4 pb-3 flex-grow-0 d-flex flex-column justify-content-end">
            <a href="{{ .Params.link }}" target="_blank" class="stretched-link"><h4 class="card-title mt-0 ">{{.Params.Title}}</h4></a>
            {{.Content}}
            <small class="card-meta mb-2">{{.Params.Author}}</small>
        </div>
    </div>
</div>
{{ end }}
