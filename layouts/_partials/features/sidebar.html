{{ $current := .current }}
{{ $ctx := .context }}
{{ $pages := $ctx.CurrentSection.RegularPages.ByWeight }}

<nav id="features-menu">
  <ul class="nav featuresMenu">
    {{ range $pages }}
      <li class="nav-item">
        <a href="#{{ .Title | anchorize }}" class="nav-link">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
</nav>
