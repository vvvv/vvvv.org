{{ $featuresPage := site.GetPage "features" }}
{{ $sections := $featuresPage.Pages.ByWeight }}

{{ "<!-- Live Visual Programming -->" | safeHTML }}
<section id="Features" class="home">
  <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">{{ $featuresPage.Title }}</h2>
                <hr class="primary">
            </div>
        </div>
  </div>
  <div class="container">
      <h1></h1>               
      <div class="row">
          <div class="col-4 mr-4">
              <aside>
                <nav>
                  <ul class="nav nav-tabs featuresMenu" role="tablist">
                    {{ range $index, $elem:=$sections }}
                      <li role="presentation">
                        <button class="nav-link{{if eq $index 0}} active{{end}}" data-toggle="tab" data-target="#feature-{{$elem.Title | urlize}}" type="button" role="tab" aria-controls="home" aria-selected="true">
                          {{$elem.Title}}
                        </button>
                      </li>
                    {{ end }}
                  </ul>
                </nav>
              </aside>
          </div>
          <div class="col-7 ml-4 tab-content">
            {{ range $index, $elem:=$sections }}
              <div class="tab-pane{{if eq $index 0}} active{{end}}" id="feature-{{.Title | urlize}}" role="tabpanel" aria-labelledby="home-tab">
                <h2>{{$elem.Title}}</h2>
                {{ .Summary }}
                <a class="btn btn-secondary" href="{{$elem.RelPermalink | absURL}}" title="More">Read more</a>
              </div>
            {{ end }}
          </div>
      </div>
  </div>
</section>
